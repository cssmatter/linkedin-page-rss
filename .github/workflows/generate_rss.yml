name: Generate LinkedIn RSS Feed

on:
  schedule:
    # Run daily at 02:00 UTC (morning) and 14:00 UTC (evening)
    - cron: '0 2 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch: # Allow manual triggering from the Actions tab

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push updated Excel and XML back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSS Generator Script
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python generate_rss.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Manish Salunke"
          git config --global user.email "cssmatter@gmail.com"
          git add source.xlsx state.json feed.xml
          git commit -m "chore: update RSS feed and Excel status [skip ci]" || echo "No changes to commit"
          git push
