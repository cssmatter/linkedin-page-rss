name: Generate LinkedIn RSS Feed

on:
  schedule:
    # Run daily at 13:00 UTC (9:00 AM EST), 17:00 UTC (1:00 PM EST), and 21:00 UTC (5:00 PM EST) - LinkedIn peak hours
    - cron: '0 13 * * *'
    - cron: '0 17 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual triggering from the Actions tab

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push updated Excel and XML back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSS Generator Script
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python generate_rss.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Manish Salunke"
          git config --global user.email "cssmatter@gmail.com"
          git add source.xlsx state.json feed.xml "courses - interview practice test.xlsx" state_interview.json feed_interview.xml
          git commit -m "chore: update RSS feed and Excel status [skip ci]" || echo "No changes to commit"
          git push
